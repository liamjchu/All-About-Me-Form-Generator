[pytest]
testpaths = tests
pythonpath = .
addopts =
    --cov=file_inputs
    --cov=pdf_filler
    --cov=ai_backend
    --cov=app
    --cov=eta
    --cov=leave_guard
    --cov=source_minimize
    --cov-report=term-missing
    --cov-fail-under=80
    --cov-branch

[coverage:run]
branch = True
omit =
    tests/*
    .venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.
show_missing = True
